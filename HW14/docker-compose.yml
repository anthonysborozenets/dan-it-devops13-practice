# Версія синтаксису docker-compose файлу
version: "3.9"

services:

  # ──────────────────────────────────────────────
  # Сервіс 1: наш Flask REST API (з HW13)
  # ──────────────────────────────────────────────
  app:
    # build: . — означає "збери образ із Dockerfile,
    # який знаходиться в поточній директорії"
    # Це і є "динамічне створення образу через docker-compose"
    build: .

    # Ім'я контейнера для зручності (замість випадкового)
    container_name: students-app

    # Перезапускати контейнер автоматично якщо він впав
    restart: unless-stopped

    # Порт 8000 контейнера НЕ відкриваємо назовні —
    # до нього звертатиметься тільки nginx всередині мережі Docker.
    # Якщо хочеш також мати прямий доступ до app — розкоментуй:
    # ports:
    #   - "8000:8000"

    # Підключаємо до спільної мережі з nginx
    networks:
      - webnet

  # ──────────────────────────────────────────────
  # Сервіс 2: nginx як reverse proxy
  # ──────────────────────────────────────────────
  nginx:
    # Офіційний образ nginx (стабільна версія на Alpine — легша)
    image: nginx:stable-alpine

    container_name: students-nginx

    restart: unless-stopped

    # Відкриваємо порт 8080 хост-машини → порт 80 контейнера nginx.
    # Усі запити йдуть: клієнт → localhost:8080 → nginx:80 → app:8000
    ports:
      - "8080:80"

    # Монтуємо наш конфіг nginx всередину контейнера.
    # Зліва — шлях на хост-машині (./nginx.conf)
    # Справа — куди покласти всередині контейнера
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

    # nginx має стартувати після того, як app вже запущений
    depends_on:
      - app

    # Підключаємо до тієї ж мережі що й app
    networks:
      - webnet

# ──────────────────────────────────────────────
# Спільна мережа для комунікації між контейнерами.
# Завдяки ній nginx може звертатись до app просто
# по імені сервісу: http://app:8000
# ──────────────────────────────────────────────
networks:
  webnet:
    driver: bridge
