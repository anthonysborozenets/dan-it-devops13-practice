# ──────────────────────────────────────────────
# Конфігурація nginx як reverse proxy
# Файл монтується в: /etc/nginx/conf.d/default.conf
# ──────────────────────────────────────────────

server {
    # nginx слухає на порті 80 всередині контейнера
    # (зовні він доступний на 8080 завдяки docker-compose ports)
    listen 80;

    # Ім'я сервера — приймаємо будь-яке (localhost, IP тощо)
    server_name _;

    # ── Основний блок проксування ──────────────
    location / {
        # Перенаправляємо всі запити до сервісу app на порт 8000.
        # "app" — це ім'я сервісу з docker-compose.yml.
        # Docker автоматично резолвить його як IP контейнера
        # завдяки спільній мережі webnet.
        proxy_pass http://app:8000;

        # Передаємо оригінальний заголовок Host клієнта
        # (щоб Flask бачив справжній хост запиту)
        proxy_set_header Host $host;

        # Передаємо реальний IP клієнта (а не IP nginx)
        proxy_set_header X-Real-IP $remote_addr;

        # Стандартний заголовок для ланцюжків проксі —
        # містить список усіх IP через які пройшов запит
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Повідомляємо застосунок що оригінальний протокол був HTTP
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
