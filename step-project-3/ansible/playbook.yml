- name: Базове налаштування master
  hosts: master
  become: true
  tasks:
    - name: Перевірити, чи swap уже увімкнено
      command: swapon --show
      register: swap_status
      changed_when: false

    - name: Створити swapfile 2G (t3.small має лише 2 ГБ RAM)
      command: fallocate -l 2G /swapfile
      args:
        creates: /swapfile
      when: "'/swapfile' not in swap_status.stdout"

    - name: Права 0600 на swapfile
      file:
        path: /swapfile
        mode: '0600'

    - name: Ініціалізувати swap
      command: mkswap /swapfile
      when: "'/swapfile' not in swap_status.stdout"

    - name: Увімкнути swap
      command: swapon /swapfile
      when: "'/swapfile' not in swap_status.stdout"

    - name: Зробити swap постійним через fstab
      lineinfile:
        path: /etc/fstab
        line: '/swapfile none swap sw 0 0'
        state: present

    - name: Оновити apt-кеш
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Поставити Java 17 і nginx
      apt:
        name:
          - openjdk-21-jre-headless
          - nginx
        state: present

    - name: Зробити Java 21 типовою
      alternatives:
        name: java
        path: /usr/lib/jvm/java-21-openjdk-amd64/bin/java

    - name: Додати актуальний GPG-ключ Jenkins
      get_url:
        url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
        dest: /usr/share/keyrings/jenkins-keyring.asc
        force: true

    - name: Додати репозиторій Jenkins
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/"
        filename: jenkins
        state: present

    - name: Поставити Jenkins
      apt:
        name: jenkins
        state: present
        update_cache: true

    - name: Запустити й увімкнути Jenkins
      service:
        name: jenkins
        state: started
        enabled: true

    - name: Прибрати default_server із дефолтного конфіга nginx
      replace:
        path: /etc/nginx/sites-available/default
        regexp: "default_server"
        replace: ""
      ignore_errors: true

    - name: nginx reverse proxy для Jenkins
      template:
        src: jenkins-nginx.conf.j2
        dest: /etc/nginx/sites-available/jenkins
      notify: reload nginx

    - name: Активувати сайт jenkins
      file:
        src: /etc/nginx/sites-available/jenkins
        dest: /etc/nginx/sites-enabled/jenkins
        state: link
      notify: reload nginx

    - name: Прибрати дефолтний сайт nginx
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: reload nginx

  handlers:
    - name: reload nginx
      service:
        name: nginx
        state: reloaded

- name: Налаштування worker
  hosts: worker
  become: true
  tasks:
    - name: Оновити apt-кеш
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Поставити Java 17 (потрібна Jenkins-агенту)
      apt:
        name: openjdk-21-jre-headless
        state: present

    - name: Залежності для репозиторію Docker
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Тека для ключів apt
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: GPG-ключ Docker
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Репозиторій Docker
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu jammy stable"
        filename: docker
        state: present

    - name: Поставити Docker Engine
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
        state: present
        update_cache: true

    - name: Створити користувача jenkins на worker
      user:
        name: jenkins
        system: true
        create_home: true
        home: /home/jenkins
        shell: /bin/bash

    - name: Додати jenkins у групу docker
      user:
        name: jenkins
        groups: docker
        append: true

    - name: Запустити й увімкнути Docker
      service:
        name: docker
        state: started
        enabled: true
